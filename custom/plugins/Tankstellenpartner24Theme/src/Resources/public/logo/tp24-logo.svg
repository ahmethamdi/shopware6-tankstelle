<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" width="560" height="130" role="img" aria-label="Tankstellenpartner 24">
  <defs>
    <linearGradient id="tpDrop" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#13365A"/>
      <stop offset="1" stop-color="#005984"/>
    </linearGradient>
    <linearGradient id="tpWord" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E1523D"/>
      <stop offset="1" stop-color="#C0392B"/>
    </linearGradient>
  </defs>

  <!-- İkon: damla + pompa -->
  <g transform="translate(6 12)">
    <!-- Damla (lacivert→mavi gradient) -->
    <path d="M52 2 C52 2 92 46 92 76 A40 40 0 1 1 12 76 C12 46 52 2 52 2 Z" fill="url(#tpDrop)"/>
    <!-- Kırmızı pompa gövdesi -->
    <rect x="58" y="46" width="30" height="58" rx="4" fill="#C0392B"/>
    <!-- Beyaz ekran -->
    <rect x="63" y="52" width="18" height="13" rx="2" fill="#fff"/>
    <!-- Pompa hortum kolu (kırmızı hat) -->
    <path d="M90 54 h9 a5 5 0 0 1 5 5 v24 a7 7 0 0 1-14 0 v-13 h-5"
          fill="none" stroke="#C0392B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Kelime markası -->
  <g transform="translate(150 0)">
    <text x="0" y="56" font-family="Montserrat, system-ui, sans-serif" font-weight="800" font-size="45" fill="url(#tpWord)" letter-spacing="0.5">TANKSTELLEN</text>
    <text x="0" y="106" font-family="Montserrat, system-ui, sans-serif" font-weight="800" font-size="45" fill="#13365A" letter-spacing="0.5">PARTNER 24</text>
  </g>
</svg>
